# ─────────────────────────────────────────────────────────────
# 1. TERMINAL & COLORS
# ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
# Enable true color support for modern terminals
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",xterm-truecolor:Tc"

# ─────────────────────────────────────────────────────────────
# 2. MOUSE & INTERACTION
# ─────────────────────────────────────────────────────────────
# Modern syntax (replaces deprecated `set -g mouse`)
set -g mouse on
# Allow clicking pane borders to resize, click titles to select
set -g mouse-select-pane on
set -g mouse-resize-pane on
set -g mouse-select-window on

# ─────────────────────────────────────────────────────────────
# 3. PREFIX KEY (Optional but recommended)
# ─────────────────────────────────────────────────────────────
# Change prefix from Ctrl+b to Ctrl+a (like screen/vim)
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# Allow prefix to be used without releasing modifier (e.g., Ctrl+a Ctrl+a)
set -g prefix2 C-a

# Auto-rename windows based on running process
setw -g automatic-rename on
set -g allow-rename off  # Prevent accidental renames
